services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Pas de port exposé sur l'hôte : la base n'est joignable que par les
    # autres conteneurs via le réseau interne Docker.
    networks:
      - myplaylog

  # Chrome headless qui résout les challenges Cloudflare : nxbrew.net (patchs FR
  # Switch) bloque les IP de datacenter du VPS par un 403. Non exposé sur l'hôte,
  # joignable seulement par le serveur via le réseau interne.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: Europe/Paris
    networks:
      - myplaylog

  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      # On force ces valeurs en prod (elles priment sur le .env s'il diffère).
      MONGODB_URI: mongodb://mongo:27017/myplaylog
      CLIENT_ORIGIN: https://myplaylog.cc
      PORT: 4000
      # Scraper nxbrew via FlareSolverr (cf. server/src/lib/nxbrew.js).
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
    volumes:
      # Les images uploadées (covers, avatars, reposts…) persistent hors conteneur.
      - uploads_data:/app/uploads
    depends_on:
      - mongo
      - flaresolverr
    networks:
      - myplaylog

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certificats HTTPS persistés pour ne pas les regénérer à chaque rebuild.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
    networks:
      - myplaylog

volumes:
  mongo_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  myplaylog:
