<!doctype html>
<html lang="fr" translate="no">
  <head>
    <meta charset="UTF-8" />
    <!-- Désactive la traduction automatique du navigateur (Google Translate /
         « Traduire cette page » sur Chrome Android). Elle remplace les nœuds de
         texte par des <font>, ce qui casse le rendu React (NotFoundError sur
         insertBefore/removeChild) et fait planter toute l'app. -->
    <meta name="google" content="notranslate" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%AE%3C/text%3E%3C/svg%3E"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="MyPlayLog — Track, note et partage tes jeux vidéo. Le journal de tes parties."
    />

    <!-- PWA : installation « comme une appli » sur mobile/desktop -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0c0d11" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyPlayLog" />

    <title>MyPlayLog — Ton journal de jeux vidéo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
